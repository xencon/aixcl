# AIXCL Application Manifest — FTSO
# Builder: Bitshower FTSO layer
#
# IMPORTANT: This file lives in the user's fork (/downstream) only.
# The upstream xencon/aixcl repo does NOT contain any FTSO-specific
# files.  The platform is kept decoupled and generic.

app:
  name: "ftso"
  version: "0.1.0"
  description: "Bitshower Flare FTSO price oracle and monitor agent"
  repository: "https://github.com/bitshower/dd-ftso-v2-provider.git"
  builder: "bitshower"

services:
  - name: "dd-ftso-v2-provider"
    container_name: "dd-ftso-v2-provider"
    image: "localhost/dd-ftso-v2-provider:latest"
    build:
      context: "provider"
      dockerfile: "Dockerfile"
    ports:
      - "3101:3101"
    healthcheck:
      type: http
      url: "http://127.0.0.1:3101/api-doc"
      startup_timeout: 180
      interval: 10
      max_retries: 3
    depends_on: ["ollama"]

  - name: "ftso-price-monitor"
    container_name: "ftso-price-monitor"
    image: "localhost/ftso-price-monitor:latest"
    build:
      context: "ftso/price-monitor"
      dockerfile: "Dockerfile"
    ports:
      - "9102:9102"
    healthcheck:
      type: http
      url: "http://127.0.0.1:9102/metrics"
      startup_timeout: 120
      interval: 10
    depends_on: ["dd-ftso-v2-provider"]

  - name: "ftso-monitor-agent"
    container_name: "ftso-monitor-agent"
    image: "localhost/ftso-monitor-agent:latest"
    build:
      context: "services/ftso-monitor-agent"
      dockerfile: "Dockerfile"
    ports:
      - "9103:9103"
    healthcheck:
      type: container_running
      startup_timeout: 30
    depends_on: ["ftso-price-monitor"]

prometheus:
  enabled: true
  targets:
    - "localhost:9102"
    - "localhost:9103"
  labels:
    app: "ftso"

grafana:
  enabled: true
  dashboards:
    - "grafana/dashboards/ftso-accuracy.json"

submodules:
  - path: "provider"
    url: "https://github.com/bitshower/dd-ftso-v2-provider.git"
    branch: "main"
