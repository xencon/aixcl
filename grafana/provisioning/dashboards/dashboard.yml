# Grafana Dashboard Provider Configuration
# This file tells Grafana where to find dashboard JSON files

apiVersion: 1

providers:
  - name: 'AIXCL'
    orgId: 1
    folder: 'AIXCL'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/AIXCL
  - name: 'AIXCL-Apps'
    orgId: 1
    folder: 'Applications'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/apps
      foldersFromFilesStructure: true

