repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-yaml
        args: ['--unsafe']
      - id: check-merge-conflict

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning', '--exclude=SC1091']

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint.yml']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ['--config', '.gitleaks.toml']

  - repo: local
    hooks:
      - id: no-non-ascii-punctuation
        name: No non-ASCII punctuation in markdown
        language: pygrep
        types: [markdown]
        entry: "[–—‘’“”… ]"
        args: ['--multiline']

      - id: check-ai-elisions
        name: Check for AI elision placeholders
        language: script
        entry: scripts/checks/check-ai-elisions.sh
        args: ['--staged']
        pass_filenames: false
        stages: [pre-commit]

      - id: check-generated-files
        name: Check for tracked generated files
        language: script
        entry: scripts/checks/check-generated-files.sh
        pass_filenames: false
        stages: [pre-commit]

      - id: check-agents
        name: Check agent and skill mirror parity
        language: script
        entry: scripts/checks/check-agents.sh
        pass_filenames: false
        stages: [pre-commit]
        files: '^(\.claude|\.opencode)/'

      - id: check-paths
        name: Check documentation relative links
        language: script
        entry: scripts/checks/check-paths.sh
        pass_filenames: false
        stages: [pre-push]

      - id: security-tests
        name: Run security tests
        language: script
        entry: tests/run-security-tests.sh
        pass_filenames: false
        stages: [pre-push]

      - id: lib-tests
        name: Run library unit tests
        language: script
        entry: tests/run-lib-tests.sh
        pass_filenames: false
        stages: [pre-push]
        files: '^(lib|tests)/'
