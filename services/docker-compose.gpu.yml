# GPU support configuration for AIXCL
# Automatically loaded when NVIDIA GPU and Container Toolkit are detected
# Also includes Docker-in-Docker fixes for entrypoint scripts

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Docker-in-Docker fix: Override entrypoint to avoid bind mount issues
    # Include permission setup that the original entrypoint provided
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Setup permissions like original entrypoint
        mkdir -p /home/ubuntu/.ollama
        chown -R ubuntu:ubuntu /home/ubuntu
        # Run ollama as ubuntu user
        exec su - ubuntu -c "ollama serve"

  vllm:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Docker-in-Docker fix: Override entrypoint to avoid bind mount issues
    entrypoint: ["/usr/bin/python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "11434"
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}"
      - "--trust-remote-code"

  llamacpp:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Docker-in-Docker fix: Use inline entrypoint script
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MODEL_FILE="${INFERENCE_MODEL:-qwen2.5-coder-0.5b-instruct-q4_k_m.gguf}"
        MODEL_BASENAME="$(basename "$MODEL_FILE")"
        MODEL_PATH="/models/${MODEL_BASENAME}"
        
        if [ ! -f "$MODEL_PATH" ]; then
          echo "⚠️ Model not found: ${MODEL_PATH}"
          echo "   Add a model using: ./aixcl models add <model.gguf>"
          exit 0
        fi
        
        echo "✅ Starting llama.cpp server with: ${MODEL_BASENAME}"
        exec /app/llama-server -m "$MODEL_PATH" --host 0.0.0.0 --port 11434
