# GPU support configuration for AIXCL
# Automatically loaded when NVIDIA GPU and Container Toolkit are detected
# Also includes Docker-in-Docker fixes for entrypoint scripts

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Docker-in-Docker fix: Override entrypoint to avoid bind mount issues
    # Include permission setup that the original entrypoint provided
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Setup permissions like original entrypoint
        mkdir -p /home/ubuntu/.ollama
        chown -R ubuntu:ubuntu /home/ubuntu
        # Run ollama as ubuntu user
        exec su - ubuntu -c "ollama serve"

  vllm:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Docker-in-Docker fix: Override entrypoint to avoid bind mount issues
    entrypoint: ["/usr/bin/python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "11434"
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}"
      - "--trust-remote-code"
    environment:
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}

  llamacpp:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Keep the entrypoint script for GPU mode - it handles model detection and startup
    volumes:
      - aixcl-llamacpp-data:/models
      - ../scripts/runtime/llamacpp-entrypoint.sh:/usr/local/bin/llamacpp-entrypoint.sh:ro
    environment:
      - INFERENCE_MODEL=${INFERENCE_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/qwen2.5-coder-0.5b-instruct-q4_k_m.gguf}
      # Enable GPU support for llama.cpp via CUDA environment variables
      - CUDA_VISIBLE_DEVICES=all
      - NVIDIA_VISIBLE_DEVICES=all
    entrypoint: ["/usr/local/bin/llamacpp-entrypoint.sh"]
    command: ["--host", "0.0.0.0", "--port", "11434"]

  nvidia-gpu-exporter:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
