services:
  ollama:
    image: docker.io/ollama/ollama:0.20.5
    container_name: ollama
    pull_policy: missing
    user: "0:0"  # Start as root to set permissions, entrypoint switches to ubuntu user
    volumes:
      - aixcl-ollama-data:/home/ubuntu/.ollama
      - ../scripts/runtime/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: ["/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # Performance tuning for parallel model queries (configured via .env)
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-8}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-1800}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-1}
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
    tty: true
    network_mode: host
    restart: unless-stopped
    # GPU resources are configured in docker-compose.gpu.yml when available
    # ARM64 platform is configured in docker-compose.arm.yml when detected
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  vault:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault
    pull_policy: missing
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://127.0.0.1:8200
    volumes:
      - aixcl-vault-data:/vault/file
      - aixcl-vault-logs:/vault/logs
      - ../vault/vault.hcl:/vault/config/vault.hcl:ro
      - ../scripts/vault/init:/vault/init:ro
    command: server
    network_mode: host
    restart: unless-stopped
    healthcheck:
      # seal-status always returns 200 regardless of seal/init state.
      # vault-init.sh handles operator init and unseal separately.
      # NOTE: CMD-SHELL is used here because ["CMD", "sh", "-c", ...] array syntax
      # silently fails with exit 1 and no output inside the container (#1167).
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200/v1/sys/seal-status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Vault Agent sidecar for PostgreSQL (runs alongside postgres)
  vault-agent-postgres:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault-agent-postgres
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../vault/agent-config:/etc/vault:ro
      - ../scripts/vault/vault-agent.sh:/usr/local/bin/vault-agent.sh:ro
      - ~/.aixcl-vault-token:/vault/token:ro
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/vault-agent.sh postgres
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Vault Agent sidecar for Open WebUI (runs alongside open-webui)
  vault-agent-openwebui:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault-agent-openwebui
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../vault/agent-config:/etc/vault:ro
      - ../scripts/vault/vault-agent-openwebui.sh:/usr/local/bin/vault-agent-openwebui.sh:ro
      - ~/.aixcl-vault-token:/vault/token:ro
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/vault-agent-openwebui.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Bootstrap service for PostgreSQL Vault KV password
  vault-agent-postgres-bootstrap:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault-agent-postgres-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - ../scripts/vault/bootstrap-password-postgres.sh:/usr/local/bin/bootstrap-password-postgres.sh:ro
      - ~/.aixcl-vault-token:/vault/token:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/bootstrap-password-postgres.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Bootstrap service for Open WebUI Vault KV password
  vault-agent-openwebui-bootstrap:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault-agent-openwebui-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - ../scripts/vault/bootstrap-password-openwebui.sh:/usr/local/bin/bootstrap-password-openwebui.sh:ro
      - ~/.aixcl-vault-token:/vault/token:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/bootstrap-password-openwebui.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

   # Bootstrap service for pgAdmin Vault KV password
  vault-agent-pgadmin-bootstrap:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault-agent-pgadmin-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - ../scripts/vault/bootstrap-password-pgadmin.sh:/usr/local/bin/bootstrap-password-pgadmin.sh:ro
      - ~/.aixcl-vault-token:/vault/token:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/bootstrap-password-pgadmin.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

   # Bootstrap service for Grafana Vault KV password
  vault-agent-grafana-bootstrap:
    image: docker.io/hashicorp/vault:1.18
    container_name: vault-agent-grafana-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - ../scripts/vault/bootstrap-password-grafana.sh:/usr/local/bin/bootstrap-password-grafana.sh:ro
      - ~/.aixcl-vault-token:/vault/token:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/bootstrap-password-grafana.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  postgres:
    image: docker.io/postgres:17.9
    container_name: postgres
    pull_policy: missing
    user: "999:999"  # Run as postgres user (official image default)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      # NOTE: Password managed by Vault. The entrypoint reads /run/secrets/postgres-password.
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - aixcl-pgdata:/var/lib/postgresql/data
      - aixcl-vault-secrets:/run/secrets:ro
      - ../scripts/runtime/postgres-secret-entrypoint.sh:/usr/local/bin/postgres-secret-entrypoint.sh:ro
      - ../scripts/db/init:/docker-entrypoint-initdb.d:ro
    network_mode: host
    restart: always
    entrypoint: ["/usr/local/bin/postgres-secret-entrypoint.sh"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Note: read_only cannot be applied - database requires write access
    command: >
      postgres
      -c listen_addresses=127.0.0.1
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_rotation_size=100MB
      -c log_min_duration_statement=0
    depends_on:
      - vault-agent-postgres-bootstrap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 3

  vllm:
    image: docker.io/vllm/vllm-openai:v0.19.0
    container_name: vllm
    pull_policy: missing
    tty: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - aixcl-hf-cache:/home/vllm/.cache/huggingface
      - ../scripts/runtime/vllm-entrypoint.sh:/vllm-entrypoint.sh:ro
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
      - PYTORCH_NO_CUDA_MEMORY_CACHING=1
      - CUDA_LAUNCH_BLOCKING=0
      - VLLM_CUDA_GRAPH_CAPTURE=${VLLM_CUDA_GRAPH_CAPTURE:-0}
      - HF_HOME=/home/vllm/.cache/huggingface
      - TRANSFORMERS_CACHE=/home/vllm/.cache/huggingface
      - HOME=/home/vllm
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}
    entrypoint: ["/vllm-entrypoint.sh"]
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda-b8334
    container_name: llamacpp
    pull_policy: missing
    user: "1000:1000"
    volumes:
      - aixcl-llamacpp-data:/models
      - ../scripts/runtime/llamacpp-entrypoint.sh:/usr/local/bin/llamacpp-entrypoint.sh:ro
    tty: true
    network_mode: host
    restart: unless-stopped
    environment:
      - INFERENCE_MODEL=${INFERENCE_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/qwen2.5-coder-0.5b-instruct-q4_k_m.gguf}
    entrypoint: ["/usr/local/bin/llamacpp-entrypoint.sh"]
    command: ["--host", "0.0.0.0", "--port", "11434"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.5
    container_name: open-webui
    pull_policy: missing
    user: "0:0"
    volumes:
      - aixcl-open-webui-main:/app/backend/data
      - aixcl-open-webui-data:/app/data
      - ../scripts/runtime/openwebui-entrypoint.sh:/usr/local/bin/openwebui-entrypoint.sh:ro
      - aixcl-vault-secrets:/run/secrets:ro
    environment:
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/backend/data/static
      # NOTE: No DATABASE_URL here — entrypoint constructs it from /run/secrets/postgres-password
      # POSTGRES_USER and POSTGRES_DATABASE must be set in .env or docker-compose
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - WEBUI_NAME=AIXCL
      - OPENAI_API_BASE_URLS=http://127.0.0.1:11434/v1
      - OPENAI_API_BASE_URL=http://127.0.0.1:11434/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENABLE_OPENAI_API=true
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-true}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # NOTE: No OPENWEBUI_EMAIL or OPENWEBUI_PASSWORD — admin user and password are managed separately via Vault
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - USER_ID=1000
      - GROUP_ID=1000
      - ENABLE_LOGIN_FORM=true
      - ENABLE_SIGNUP=true
      - ENABLE_INITIAL_ADMIN_SIGNUP=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    network_mode: host
    restart: always
    entrypoint: ["/usr/local/bin/openwebui-entrypoint.sh"]
    command: []
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health > /dev/null 2>&1 || curl -f http://127.0.0.1:8080/ > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  pgadmin:
    image: docker.io/dpage/pgadmin4:9.15.0
    container_name: pgadmin
    pull_policy: missing
    network_mode: host
    environment:
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_LISTEN_ADDRESS: 127.0.0.1
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_USER_ID: "5050"
      PGADMIN_GROUP_ID: "5050"
    volumes:
      - aixcl-pgadmin-storage:/var/lib/pgadmin/storage
      - aixcl-pgadmin-main:/var/lib/pgadmin
      - ../logs/pgadmin:/var/log/pgadmin
      - ../pgadmin-servers.json:/pgadmin4/servers.json
      - ../scripts/runtime/pgadmin-entrypoint.sh:/usr/local/bin/pgadmin-entrypoint.sh:ro
      - aixcl-vault-secrets:/run/secrets:ro
    user: "0:0"  # Start as root, entrypoint drops to pgadmin user
    # Note: Security hardening removed - cap_drop/no-new-privileges breaks su authentication
    # The entrypoint requires privilege escalation to switch from root to pgadmin user
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/pgadmin-entrypoint.sh"]

  prometheus:
    image: docker.io/prom/prometheus:v3.11.1
    container_name: prometheus
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - aixcl-prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: docker.io/prom/alertmanager:v0.28.0
    container_name: alertmanager
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - aixcl-alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=127.0.0.1:9093'
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: docker.io/grafana/grafana:12.4.2
    container_name: grafana
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - aixcl-grafana:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - aixcl-vault-secrets:/run/secrets:ro
      - ../scripts/runtime/grafana-entrypoint.sh:/usr/local/bin/grafana-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/grafana-entrypoint.sh"]
    environment:
      # NOTE: No GF_SECURITY_ADMIN_USER or GF_SECURITY_ADMIN_PASSWORD here -- Grafana
      # will prompt for first-time admin creation when neither is set.
      - GF_SERVER_HTTP_PORT=3000
    command: []
    network_mode: host
    depends_on:
      - prometheus
      - loki
      - vault-agent-grafana-bootstrap
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    pull_policy: missing
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /dev/disk/:/dev/disk:ro
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    devices:
      - /dev/kmsg
    network_mode: host
    restart: unless-stopped
    command:
      - '--port=8081'
      - '--docker_only=true'

  node-exporter:
    image: docker.io/prom/node-exporter:v1.11.1
    container_name: node-exporter
    pull_policy: missing
    user: "65534:65534"  # node-exporter user (official image default) - avoids 'nobody' ambiguity
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    network_mode: host
    restart: unless-stopped

  postgres-exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres-exporter
    pull_policy: missing
    user: "65534:65534"  # postgres-exporter user (official image default) - avoids 'nobody' ambiguity
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    entrypoint: ["/usr/local/bin/postgres-exporter-entrypoint.sh"]
    volumes:
      - ../scripts/runtime/postgres-exporter-entrypoint.sh:/usr/local/bin/postgres-exporter-entrypoint.sh:ro
      - aixcl-vault-secrets:/run/secrets:ro
    environment:
      # PostgreSQL credentials are read from Vault by the entrypoint
      # Do not set DATA_SOURCE_NAME here; it is constructed from /run/secrets/postgres-password
      # These must be explicitly set by the user (via .env) — no hardcoded defaults.
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
    network_mode: host
    depends_on:
      - postgres
      - vault-agent-postgres
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: docker.io/utkuozdemir/nvidia_gpu_exporter:1.3.2
    container_name: nvidia-gpu-exporter
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: host
    restart: unless-stopped
    command: ["--web.listen-address=:9445"]
    # GPU resources are configured in docker-compose.gpu.yml when available
    # This service will gracefully fail on systems without NVIDIA GPUs

  loki:
    image: docker.io/grafana/loki:3.3.0
    container_name: loki
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - aixcl-loki:/loki
    command: -config.file=/etc/loki/loki-config.yml
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  dd-ftso-v2-provider:
    image: localhost/dd-ftso-v2-provider:latest
    container_name: dd-ftso-v2-provider
    pull_policy: missing
    build:
      context: ../provider/dd-ftso-v2-provider
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NODE_OPTIONS=--max-old-space-size=2048
      - VALUE_PROVIDER_CLIENT_PORT=${VALUE_PROVIDER_CLIENT_PORT:-3101}
      - VALUE_PROVIDER_CLIENT_BASE_PATH=${VALUE_PROVIDER_CLIENT_BASE_PATH:-}
      - VALUE_PROVIDER_IMPL=${VALUE_PROVIDER_IMPL:-}
      - LOG_LEVEL=${LOG_LEVEL:-log}
      - VOLUME_WEIGHTING=linear
    network_mode: host
    restart: unless-stopped
    cpus: '1.0'
    mem_limit: 4096m
    mem_reservation: 2048m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3101/api-doc',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ftso-price-monitor:
    image: localhost/ftso-price-monitor:latest
    container_name: ftso-price-monitor
    pull_policy: missing
    build:
      context: ../ftso/price-monitor
    environment:
      - PROVIDER_URL=http://localhost:3101
      - POLL_INTERVAL=30
      - METRICS_PORT=9102
      - PRIMARY_BAND_PCT=0.25
    network_mode: host
    restart: unless-stopped
    depends_on:
      dd-ftso-v2-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9102/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ftso-proposals-init:
    image: busybox:latest
    container_name: ftso-proposals-init
    user: root
    command: ["sh", "-c", "mkdir -p /proposals && chown -R 10001:10001 /proposals"]
    volumes:
      - /home/sbadakhc/ftso-proposals:/proposals
    restart: "no"

  ftso-monitor-agent:
    image: localhost/ftso-monitor-agent:latest
    container_name: ftso-monitor-agent
    pull_policy: missing
    build:
      context: ./ftso-monitor-agent
    environment:
      - METRICS_URL=http://localhost:9102/metrics
      - PROMETHEUS_URL=http://localhost:9090
      - OLLAMA_URL=http://localhost:11434
      - OLLAMA_MODEL=phi3:latest
      - POLL_INTERVAL=60
      - BAND_THRESHOLD=0.25
      - APPROACH_FRACTION=0.60
      - INTERACTIVE=0
      - LOG_LEVEL=INFO
      - ALERTMANAGER_URL=http://localhost:9093
      - LOKI_URL=http://localhost:3100
      - PROPOSALS_DIR=/proposals
    network_mode: host
    restart: unless-stopped
    depends_on:
      ftso-price-monitor:
        condition: service_healthy
      ftso-proposals-init:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - /home/sbadakhc/ftso-proposals:/proposals
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  ollama-exporter:
    image: python:3.11-slim
    container_name: ollama-exporter
    pull_policy: missing
    volumes:
      - ../scripts/exporters/ollama-exporter-enhanced.py:/exporter.py:ro
    command: ["python3", "/exporter.py"]
    network_mode: host
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11435/metrics', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  openwebui-exporter:
    image: python:3.11-slim
    container_name: openwebui-exporter
    pull_policy: missing
    volumes:
      - ../scripts/exporters/openwebui-exporter.py:/exporter.py:ro
