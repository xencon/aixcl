services:
  ollama:
    image: docker.io/ollama/ollama:0.20.5
    container_name: ollama
    pull_policy: if_not_present
    user: "0:0"  # Start as root to set permissions, entrypoint switches to ubuntu user
    volumes:
      - ollama:/home/ubuntu/.ollama
      - ../scripts/runtime/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: ["/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # Performance tuning for parallel model queries (configured via .env)
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-8}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-1800}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-1}
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
    tty: true
    network_mode: host
    restart: unless-stopped
    # GPU resources are configured in docker-compose.gpu.yml when available
    # ARM64 platform is configured in docker-compose.arm.yml when detected
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  vllm:
    image: docker.io/vllm/vllm-openai:v0.19.0
    container_name: vllm
    pull_policy: if_not_present
    tty: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - huggingface-cache:/home/vllm/.cache/huggingface
      - ../scripts/runtime/vllm-entrypoint.sh:/vllm-entrypoint.sh:ro
    environment:
      # vLLM runtime configuration (configured via .env)
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
      - PYTORCH_NO_CUDA_MEMORY_CACHING=1
      - CUDA_LAUNCH_BLOCKING=0
      - VLLM_CUDA_GRAPH_CAPTURE=${VLLM_CUDA_GRAPH_CAPTURE:-0}
      - HF_HOME=/home/vllm/.cache/huggingface
      - TRANSFORMERS_CACHE=/home/vllm/.cache/huggingface
      - HOME=/home/vllm
    # Use custom entrypoint to run as non-root user
    entrypoint: ["/vllm-entrypoint.sh"]
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # Note: read_only cannot be applied - entrypoint creates vllm user with useradd
    # vLLM startup command with configurable model and memory settings
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.8}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-32768}"
      - "--port"
      - "11434"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--enforce-eager"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda-b8334
    container_name: llamacpp
    pull_policy: if_not_present
    user: "1000:1000"  # Run as non-root user for security
    volumes:
      - llamacpp-data:/models
      - ../scripts/runtime/llamacpp-entrypoint.sh:/usr/local/bin/llamacpp-entrypoint.sh:ro
    tty: true
    network_mode: host
    restart: unless-stopped
    environment:
      # llama.cpp model configuration (configured via .env)
      - INFERENCE_MODEL=${INFERENCE_MODEL:-qwen2.5-coder-0.5b-instruct-q4_k_m.gguf}
    entrypoint: ["/usr/local/bin/llamacpp-entrypoint.sh"]
    command: ["--host", "0.0.0.0", "--port", "11434"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    pull_policy: if_not_present
    user: "0:0"  # Start as root for permission setup, entrypoint switches to non-root
    volumes:
      - open-webui:/app/backend/data
      - open-webui-data:/app/data
      - ../scripts/runtime/openwebui.sh:/app/backend/openwebui.sh
      - ../scripts/runtime/openwebui-entrypoint.sh:/usr/local/bin/openwebui-entrypoint.sh:ro
    environment:
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/backend/data/static
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DATABASE}
      - WEBUI_NAME=AIXCL
      # Use OpenAI-compatible API for all engines (Ollama, llama.cpp, vLLM all support this)
      # Use OPENAI_API_BASE_URLS (plural) which is the correct variable name
      - OPENAI_API_BASE_URLS=http://127.0.0.1:11434/v1
      - OPENAI_API_BASE_URL=http://127.0.0.1:11434/v1
      # OpenAI API key - left empty for local models as they don't require authentication
      # This prevents "Missing bearer authentication" errors with vLLM and other local engines
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Enable OpenAI API for model discovery (uses OpenAI-compatible endpoint at OLLAMA_BASE_URL)
      # This ensures models are discovered with owned_by='openai' instead of 'ollama'
      - ENABLE_OPENAI_API=true
      # Conditionally enable Ollama API based on engine selection
      # Set ENABLE_OLLAMA_API=false in .env when using llamacpp or vllm to disable Ollama-specific features
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-true}
      # Only set OLLAMA_BASE_URL when Ollama engine is active
      # This prevents Open WebUI from trying to query Ollama API when using vLLM or llamacpp
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENWEBUI_EMAIL=${OPENWEBUI_EMAIL}
      - OPENWEBUI_PASSWORD=${OPENWEBUI_PASSWORD}
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - USER_ID=1000
      - GROUP_ID=1000
      # Enable signup for initial admin user creation
      - ENABLE_SIGNUP=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    network_mode: host
    restart: always
    entrypoint: ["/usr/local/bin/openwebui-entrypoint.sh"]
    command: []
    healthcheck:
      # Try /health first, fallback to root endpoint if /health doesn't exist
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health > /dev/null 2>&1 || curl -f http://127.0.0.1:8080/ > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:17.9
    container_name: postgres
    pull_policy: if_not_present
    user: "999:999"  # Run as postgres user (official image default)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-webui}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/db/init:/docker-entrypoint-initdb.d:ro
    network_mode: host
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Note: read_only cannot be applied - database requires write access
    command: >
      postgres
      -c listen_addresses=127.0.0.1
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_rotation_size=100MB
      -c log_min_duration_statement=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  pgadmin:
    image: dpage/pgadmin4:9.14.0
    container_name: pgadmin
    pull_policy: if_not_present
    network_mode: host
    environment:
      PGADMIN_DEFAULT_EMAIL: $PGADMIN_EMAIL
      PGADMIN_DEFAULT_PASSWORD: $PGADMIN_PASSWORD
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_LISTEN_ADDRESS: 127.0.0.1
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_USER_ID: "5050"
      PGADMIN_GROUP_ID: "5050"
    volumes:
      - pgadmin-storage:/var/lib/pgadmin/storage
      - pgadmin-data:/var/lib/pgadmin
      - ../logs/pgadmin:/var/log/pgadmin
      - ../pgadmin-servers.json:/pgadmin4/servers.json
      - ../scripts/runtime/pgadmin-entrypoint.sh:/usr/local/bin/pgadmin-entrypoint.sh:ro
    user: "0:0"  # Start as root, entrypoint drops to pgadmin user
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # Note: read_only cannot be applied to pgAdmin as it writes to multiple
    # locations including /pgadmin4/servers.json during startup
    entrypoint: ["/usr/local/bin/pgadmin-entrypoint.sh"]

  prometheus:
    image: prom/prometheus:v3.11.1
    container_name: prometheus
    pull_policy: if_not_present
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    pull_policy: if_not_present
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=127.0.0.1:9093'
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    pull_policy: if_not_present
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_HTTP_PORT=3000
    network_mode: host
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    pull_policy: if_not_present
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    network_mode: host
    restart: unless-stopped
    command:
      - '--port=8081'
      - '--docker_only=true'

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    pull_policy: if_not_present
    user: "65534:65534"  # node-exporter user (official image default) - avoids 'nobody' ambiguity
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    network_mode: host
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres-exporter
    pull_policy: if_not_present
    user: "65534:65534"  # postgres-exporter user (official image default) - avoids 'nobody' ambiguity
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DATABASE}?sslmode=disable"
    network_mode: host
    depends_on:
      - postgres
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    container_name: nvidia-gpu-exporter
    pull_policy: if_not_present
    user: "999:999"  # nvidia-dcgm user - official image default for GPU metrics
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m
    network_mode: host
    restart: unless-stopped
    environment:
      - DCGM_EXPORTER_LISTEN=:9400
    # GPU resources are configured in docker-compose.gpu.yml when available
    # This service will gracefully fail on systems without NVIDIA GPUs

  loki:
    image: grafana/loki:3.3.0
    container_name: loki
    pull_policy: if_not_present
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SECURITY NOTE: Alloy requires Docker socket access for container log discovery.
  # Docker socket access grants full root access on the host. Security mitigations applied:
  # - Runs as alloy user (UID 12345) via entrypoint with docker group membership
  # - Read-only root filesystem prevents runtime modifications
  # - cap_drop: ALL with SETUID cap_add (allows su for user switching)
  # - Writable data volume for Alloy state, tmpfs for temporary files
  # - All bind mounts are read-only (:ro suffix)
  # - Docker socket path auto-detected (supports rootless via DOCKER_SOCK env var)
  # See docs/operations/security.md section 6 for details.
  alloy:
    image: grafana/alloy:v1.15.0
    container_name: alloy
    pull_policy: if_not_present
    user: "0:0"  # Start as root, entrypoint drops to alloy user (12345) with docker group
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/data-alloy
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ../scripts/runtime/alloy-entrypoint.sh:/usr/local/bin/alloy-entrypoint.sh:ro
    entrypoint: /usr/local/bin/alloy-entrypoint.sh
    network_mode: host
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  ollama:
  huggingface-cache:
  vllm-data:
  llamacpp-data:
  open-webui:
  open-webui-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  loki-data:
  alloy-data:
  alertmanager-data:
  pgadmin-storage:
  pgadmin-data:
  pgadmin-config:
