services:
  ollama:
    image: docker.io/ollama/ollama:0.20.5
    container_name: ollama
    pull_policy: missing
    user: "0:0"  # Start as root to set permissions, entrypoint switches to ubuntu user
    volumes:
      - aixcl-ollama-data:/home/ubuntu/.ollama
      - ../scripts/runtime/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: ["/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # Performance tuning for parallel model queries (configured via .env)
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-8}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-1800}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-1}
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
    tty: true
    network_mode: host
    restart: unless-stopped
    # GPU resources are configured in docker-compose.gpu.yml when available
    # ARM64 platform is configured in docker-compose.arm.yml when detected
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  vault:
    image: hashicorp/vault:1.18
    container_name: vault
    pull_policy: missing
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://127.0.0.1:8200
      VAULT_DEV_ROOT_TOKEN_ID: aixcl-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - aixcl-vault-data:/vault/file
      - ../scripts/vault/init:/vault/init:ro
    command: server -dev -dev-root-token-id=aixcl-dev-token
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  vault-init:
    image: hashicorp/vault:1.18
    container_name: vault-init
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../scripts/vault/init-vault.sh:/usr/local/bin/init-vault.sh:ro
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: aixcl-dev-token
    command: /usr/local/bin/init-vault.sh
    network_mode: host
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  # Vault Agent sidecar for PostgreSQL (runs alongside postgres)
  vault-agent-postgres:
    image: hashicorp/vault:1.18
    container_name: vault-agent-postgres
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../vault/agent-config:/etc/vault:ro
      - ../scripts/vault/vault-agent.sh:/usr/local/bin/vault-agent.sh:ro
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/vault-agent.sh postgres
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Vault Agent sidecar for Open WebUI (runs alongside open-webui)
  vault-agent-openwebui:
    image: hashicorp/vault:1.18
    container_name: vault-agent-openwebui
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../vault/agent-config:/etc/vault:ro
      - ../scripts/vault/vault-agent-openwebui.sh:/usr/local/bin/vault-agent-openwebui.sh:ro
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: /usr/local/bin/vault-agent-openwebui.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Bootstrap service for PostgreSQL Vault KV password
  vault-agent-postgres-bootstrap:
    image: hashicorp/vault:1.18
    container_name: vault-agent-postgres-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../scripts/vault/bootstrap-password-postgres.sh:/usr/local/bin/bootstrap-password-postgres.sh:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: aixcl-dev-token
    command: /usr/local/bin/bootstrap-password-postgres.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Bootstrap service for Open WebUI Vault KV password
  vault-agent-openwebui-bootstrap:
    image: hashicorp/vault:1.18
    container_name: vault-agent-openwebui-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../scripts/vault/bootstrap-password-openwebui.sh:/usr/local/bin/bootstrap-password-openwebui.sh:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: aixcl-dev-token
    command: /usr/local/bin/bootstrap-password-openwebui.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  # Bootstrap service for pgAdmin Vault KV password
  vault-agent-pgadmin-bootstrap:
    image: hashicorp/vault:1.18
    container_name: vault-agent-pgadmin-bootstrap
    pull_policy: missing
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    volumes:
      - ../scripts/vault/bootstrap-password-pgadmin.sh:/usr/local/bin/bootstrap-password-pgadmin.sh:ro
      - aixcl-vault-secrets:/run/secrets
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: aixcl-dev-token
    command: /usr/local/bin/bootstrap-password-pgadmin.sh
    network_mode: host
    depends_on:
      - vault
    restart: unless-stopped

  postgres:
    image: docker.io/postgres:17.9
    container_name: postgres
    pull_policy: missing
    user: "999:999"  # Run as postgres user (official image default)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-webui}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - aixcl-pgdata:/var/lib/postgresql/data
      - aixcl-vault-secrets:/run/secrets:ro
      - ../scripts/db/init:/docker-entrypoint-initdb.d:ro
    network_mode: host
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Note: read_only cannot be applied - database requires write access
    command: >
      postgres
      -c listen_addresses=127.0.0.1
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_rotation_size=100MB
      -c log_min_duration_statement=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 3

  vllm:
    image: docker.io/vllm/vllm-openai:v0.19.0
    container_name: vllm
    pull_policy: missing
    tty: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - aixcl-hf-cache:/home/vllm/.cache/huggingface
      - ../scripts/runtime/vllm-entrypoint.sh:/vllm-entrypoint.sh:ro
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
      - PYTORCH_NO_CUDA_MEMORY_CACHING=1
      - CUDA_LAUNCH_BLOCKING=0
      - VLLM_CUDA_GRAPH_CAPTURE=${VLLM_CUDA_GRAPH_CAPTURE:-0}
      - HF_HOME=/home/vllm/.cache/huggingface
      - TRANSFORMERS_CACHE=/home/vllm/.cache/huggingface
      - HOME=/home/vllm
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}
    entrypoint: ["/vllm-entrypoint.sh"]
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda-b8334
    container_name: llamacpp
    pull_policy: missing
    user: "1000:1000"
    volumes:
      - aixcl-llamacpp-data:/models
      - ../scripts/runtime/llamacpp-entrypoint.sh:/usr/local/bin/llamacpp-entrypoint.sh:ro
    tty: true
    network_mode: host
    restart: unless-stopped
    environment:
      - INFERENCE_MODEL=${INFERENCE_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/qwen2.5-coder-0.5b-instruct-q4_k_m.gguf}
    entrypoint: ["/usr/local/bin/llamacpp-entrypoint.sh"]
    command: ["--host", "0.0.0.0", "--port", "11434"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.1
    container_name: open-webui
    pull_policy: missing
    user: "0:0"
    volumes:
      - aixcl-open-webui-main:/app/backend/data
      - aixcl-open-webui-data:/app/data
      - ../scripts/runtime/openwebui.sh:/app/backend/openwebui.sh
      - ../scripts/runtime/openwebui-entrypoint.sh:/usr/local/bin/openwebui-entrypoint.sh:ro
    environment:
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/backend/data/static
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DATABASE:-webui}
      - WEBUI_NAME=AIXCL
      - OPENAI_API_BASE_URLS=http://127.0.0.1:11434/v1
      - OPENAI_API_BASE_URL=http://127.0.0.1:11434/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENABLE_OPENAI_API=true
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-true}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENWEBUI_EMAIL=${OPENWEBUI_EMAIL}
      - OPENWEBUI_PASSWORD=${OPENWEBUI_PASSWORD}
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - USER_ID=1000
      - GROUP_ID=1000
      - ENABLE_SIGNUP=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    network_mode: host
    restart: always
    entrypoint: ["/usr/local/bin/openwebui-entrypoint.sh"]
    command: []
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health > /dev/null 2>&1 || curl -f http://127.0.0.1:8080/ > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  pgadmin:
    image: docker.io/dpage/pgadmin4:9.14.0
    container_name: pgadmin
    pull_policy: missing
    network_mode: host
    environment:
      PGADMIN_DEFAULT_EMAIL: $PGADMIN_EMAIL
      PGADMIN_DEFAULT_PASSWORD: $PGADMIN_PASSWORD
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_LISTEN_ADDRESS: 127.0.0.1
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_USER_ID: "5050"
      PGADMIN_GROUP_ID: "5050"
    volumes:
      - aixcl-pgadmin-storage:/var/lib/pgadmin/storage
      - aixcl-pgadmin-main:/var/lib/pgadmin
      - ../logs/pgadmin:/var/log/pgadmin
      - ../pgadmin-servers.json:/pgadmin4/servers.json
      - ../scripts/runtime/pgadmin-entrypoint.sh:/usr/local/bin/pgadmin-entrypoint.sh:ro
    user: "0:0"  # Start as root, entrypoint drops to pgadmin user
    # Note: Security hardening removed - cap_drop/no-new-privileges breaks su authentication
    # The entrypoint requires privilege escalation to switch from root to pgadmin user
    entrypoint: ["/usr/local/bin/pgadmin-entrypoint.sh"]

  prometheus:
    image: docker.io/prom/prometheus:v3.11.1
    container_name: prometheus
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - aixcl-prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: docker.io/prom/alertmanager:v0.28.0
    container_name: alertmanager
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - aixcl-alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=127.0.0.1:9093'
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: docker.io/grafana/grafana:12.4.2
    container_name: grafana
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - aixcl-grafana:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_HTTP_PORT=3000
    network_mode: host
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    pull_policy: missing
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    network_mode: host
    restart: unless-stopped
    command:
      - '--port=8081'
      - '--docker_only=true'

  node-exporter:
    image: docker.io/prom/node-exporter:v1.11.1
    container_name: node-exporter
    pull_policy: missing
    user: "65534:65534"  # node-exporter user (official image default) - avoids 'nobody' ambiguity
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    network_mode: host
    restart: unless-stopped

  postgres-exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres-exporter
    pull_policy: missing
    user: "65534:65534"  # postgres-exporter user (official image default) - avoids 'nobody' ambiguity
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DATABASE}?sslmode=require"
    network_mode: host
    depends_on:
      - postgres
      - vault-agent-postgres
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    container_name: nvidia-gpu-exporter
    pull_policy: missing
    user: "999:999"  # nvidia-dcgm user - official image default for GPU metrics
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m
    network_mode: host
    restart: unless-stopped
    environment:
      - DCGM_EXPORTER_LISTEN=:9400
    # GPU resources are configured in docker-compose.gpu.yml when available
    # This service will gracefully fail on systems without NVIDIA GPUs

  loki:
    image: docker.io/grafana/loki:3.3.0
    container_name: loki
    pull_policy: missing
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - aixcl-loki:/loki
    command: -config.file=/etc/loki/loki-config.yml
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SECURITY NOTE: Alloy requires Docker socket access for container log discovery.
  # Docker socket access grants full root access on the host. Security mitigations applied:
  # - Runs as alloy user (UID 12345) via entrypoint with docker group membership
  # - Read-only root filesystem prevents runtime modifications
  # - cap_drop: ALL with SETUID cap_add (allows su for user switching)
  # - Writable data volume for Alloy state, tmpfs for temporary files
  # - All bind mounts are read-only (:ro suffix)
  # - Docker socket path auto-detected (supports rootless via DOCKER_SOCK env var)
  # See docs/operations/security.md section 6 for details.
  alloy:
    image: docker.io/grafana/alloy:v1.15.0
    container_name: alloy
    pull_policy: missing
    # Run as root to read protected log files and access docker socket
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      # Use tmpfs for Alloy data to avoid permission issues with named volumes
      - /data-alloy:noexec,nosuid,size=100m
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ../scripts/runtime/alloy-entrypoint.sh:/usr/local/bin/alloy-entrypoint.sh:ro
    entrypoint: /usr/local/bin/alloy-entrypoint.sh
    environment:
      - DOCKER_GID=${DOCKER_GID:-989}
    network_mode: host
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  aixcl-ollama-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-hf-cache:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-vllm-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-llamacpp-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-open-webui-main:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-open-webui-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-pgdata:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-prometheus:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-grafana:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-loki:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-alloy-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-alertmanager-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-pgadmin-storage:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-pgadmin-main:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-pgadmin-config:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-vault-data:
    # external: true  # Disabled: volumes created automatically by compose
  aixcl-vault-secrets:
    # external: true  # Disabled: volumes created automatically by compose
