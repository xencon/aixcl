version: 2

updates:
  - package-ecosystem: "docker"
    directory: "/services"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    assignees:
      - "sbadakhc"
    labels:
      - "component:infrastructure"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    assignees:
      - "sbadakhc"
    labels:
      - "component:infrastructure"
    commit-message:
      prefix: "chore"
