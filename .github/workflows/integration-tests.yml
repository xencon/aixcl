name: Integration Tests

on:
  push:
    branches: 
      - "main"
      - "dev"
  pull_request:
    branches: 
      - "main"
      - "dev"
  workflow_dispatch:
  schedule:
    # Run nightly at 2 AM UTC (off-peak hours)
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  check-env:
    name: Check Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Make aixcl executable
        run: chmod +x ./aixcl

      - name: Run aixcl check-env
        run: ./aixcl utils check-env

  check-line-endings:
    name: Check Line Endings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for Windows line endings (CRLF)
        run: |
          echo "Checking for CRLF line endings..."
          CRLF_FILES=$(find . -type f -not -path "./.git/*" -not -path "./pgadmin-data/*" -not -path "./logs/*" -exec file {} \; 2>/dev/null | grep -i "with CRLF" | cut -d: -f1 | sed 's|^\./||')
          if [ -n "$CRLF_FILES" ]; then
            echo "ERROR: Found files with Windows line endings (CRLF):"
            echo "$CRLF_FILES"
            echo ""
            echo "Please convert these files to Unix line endings (LF) before committing."
            echo "You can use: sed -i 's/\\r$//' <file>"
            exit 1
          else
            echo "✓ No CRLF files found - all line endings are Unix style (LF)"
          fi

  compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [check-env, check-line-endings]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Validate Compose Files
        run: |
          echo "Validating Docker Compose files..."
          
          # Create minimal .env with required vars for validation
          cat > .env << 'EOF'
INFERENCE_ENGINE=ollama
PROFILE=usr
POSTGRES_USER=admin
POSTGRES_PASSWORD=test
POSTGRES_DATABASE=webui
PGADMIN_EMAIL=admin@test.com
PGADMIN_PASSWORD=test
OPENWEBUI_EMAIL=admin@test.com
OPENWEBUI_PASSWORD=test
GRAFANA_ADMIN_USER=admin
GRAFANA_ADMIN_PASSWORD=test
OLLAMA_HOST=0.0.0.0:11434
OLLAMA_NUM_PARALLEL=8
OLLAMA_MAX_LOADED_MODELS=3
OLLAMA_KEEP_ALIVE=1800
OLLAMA_NUM_GPU=1
OLLAMA_NUM_THREAD=8
VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
VLLM_CUDA_GRAPH_CAPTURE=0
EOF
          
          # Validate main compose file
          docker compose -f services/docker-compose.yml config > /dev/null || exit 1
          echo "✓ Main compose file valid"
          
          # Check all compose files exist and are valid YAML
          for file in services/docker-compose*.yml; do
            if [ -f "$file" ]; then
              docker compose -f "$file" config > /dev/null || exit 1
              echo "✓ $(basename $file) valid"
            fi
          done
          
          echo "All compose files validated successfully"

      - name: Test Engine Configuration
        run: |
          echo "Testing engine configuration..."
          
          # Create minimal .env
          echo "INFERENCE_ENGINE=ollama" > .env
          echo "PROFILE=usr" >> .env
          
          # Test engine set commands
          chmod +x ./aixcl
          
          # Test each engine
          for engine in ollama vllm llamacpp; do
            ./aixcl engine set $engine
            grep -q "INFERENCE_ENGINE=$engine" .env || exit 1
            echo "✓ Engine $engine configured"
          done
          
          # Test auto-detect
          ./aixcl engine auto
          echo "✓ Engine auto-detect works"
          
          echo "Engine configuration tests PASSED"

      - name: Test Stack Configuration
        run: |
          echo "Testing stack configuration..."
          
          # Create minimal .env
          echo "INFERENCE_ENGINE=ollama" > .env
          echo "PROFILE=usr" >> .env
          
          # Validate stack configs without starting
          ./aixcl stack status 2>/dev/null || true
          
          echo "✓ Stack configuration validated"
          echo "Stack configuration tests PASSED"
