name: Integration Tests

on:
  push:
    branches: 
      - "main"
      - "dev"
  pull_request:
    branches: 
      - "main"
      - "dev"
  workflow_dispatch:
  schedule:
    # Run nightly at 2 AM UTC (off-peak hours)
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  check-env:
    name: Check Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Make aixcl executable
        run: chmod +x ./aixcl

      - name: Run aixcl check-env
        run: ./aixcl utils check-env

  check-line-endings:
    name: Check Line Endings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for Windows line endings (CRLF)
        run: |
          echo "Checking for CRLF line endings..."
          CRLF_FILES=$(find . -type f -not -path "./.git/*" -not -path "./pgadmin-data/*" -not -path "./logs/*" -exec file {} \; 2>/dev/null | grep -i "with CRLF" | cut -d: -f1 | sed 's|^\./||')
          if [ -n "$CRLF_FILES" ]; then
            echo "ERROR: Found files with Windows line endings (CRLF):"
            echo "$CRLF_FILES"
            echo ""
            echo "Please convert these files to Unix line endings (LF) before committing."
            echo "You can use: sed -i 's/\\r$//' <file>"
            exit 1
          else
            echo "✓ No CRLF files found - all line endings are Unix style (LF)"
          fi

  compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [check-env, check-line-endings]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Validate Compose Files
        run: |
          echo "Validating Docker Compose files..."
          
          # Create minimal .env with required vars for validation
          cat > .env << 'EOF'
INFERENCE_ENGINE=ollama
PROFILE=usr
POSTGRES_USER=admin
POSTGRES_PASSWORD=test
POSTGRES_DATABASE=webui
PGADMIN_EMAIL=admin@test.com
PGADMIN_PASSWORD=test
OPENWEBUI_EMAIL=admin@test.com
OPENWEBUI_PASSWORD=test
GRAFANA_ADMIN_USER=admin
GRAFANA_ADMIN_PASSWORD=test
OLLAMA_HOST=0.0.0.0:11434
OLLAMA_NUM_PARALLEL=8
OLLAMA_MAX_LOADED_MODELS=3
OLLAMA_KEEP_ALIVE=1800
OLLAMA_NUM_GPU=1
OLLAMA_NUM_THREAD=8
VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
VLLM_CUDA_GRAPH_CAPTURE=0
EOF
          
          # Validate main compose file
          docker compose -f services/docker-compose.yml config > /dev/null || exit 1
          echo "✓ Main compose file valid"
          
          # Check all compose files exist and are valid YAML
          for file in services/docker-compose*.yml; do
            if [ -f "$file" ]; then
              docker compose -f "$file" config > /dev/null || exit 1
              echo "✓ $(basename $file) valid"
            fi
          done
          
          echo "All compose files validated successfully"

      - name: Test Engine Configuration
        run: |
          echo "Testing engine configuration..."
          
          # Create minimal .env
          echo "INFERENCE_ENGINE=ollama" > .env
          echo "PROFILE=usr" >> .env
          
          # Test engine set commands
          chmod +x ./aixcl
          
          # Test each engine
          for engine in ollama vllm llamacpp; do
            ./aixcl engine set $engine
            grep -q "INFERENCE_ENGINE=$engine" .env || exit 1
            echo "✓ Engine $engine configured"
          done
          
          # Test auto-detect
          ./aixcl engine auto
          echo "✓ Engine auto-detect works"
          
          echo "Engine configuration tests PASSED"

      - name: Test Stack Configuration
        run: |
          echo "Testing stack configuration..."
          
          # Create minimal .env
          echo "INFERENCE_ENGINE=ollama" > .env
          echo "PROFILE=usr" >> .env
          
          # Validate stack configs without starting
          ./aixcl stack status 2>/dev/null || true
          
          echo "✓ Stack configuration validated"
          echo "Stack configuration tests PASSED"

  devcontainer-engine-tests:
    name: Devcontainer Engine Tests (CPU-only)
    runs-on: ubuntu-latest
    needs: [check-env, check-line-endings]
    # Note: Tests run in CPU-only mode since GitHub Actions doesn't provide GPU
    # GPU functionality is tested via compose file validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Free up disk space
        run: |
          echo "Freeing up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes
          df -h

      - name: Initialize AIXCL environment
        run: |
          echo "Creating .env file..."
          # Copy from example and add required test values
          cp config/.env.example .env 2>/dev/null || cp .env.example .env 2>/dev/null || echo "Creating from scratch"
          
          # Set required values for CI testing
          echo "POSTGRES_PASSWORD=test-password-ci" >> .env
          echo "OPENWEBUI_PASSWORD=test-password-ci" >> .env
          echo "GRAFANA_ADMIN_PASSWORD=test-password-ci" >> .env
          echo "ENABLE_OLLAMA_API=true" >> .env
          echo "OLLAMA_BASE_URL=" >> .env
          echo "OPENAI_API_KEY=" >> .env
          echo "PROFILE=usr" >> .env
          
          echo ".env file created:"
          cat .env | grep -v PASSWORD | head -20
          echo ""
          echo "Creating external volumes..."
          chmod +x ./scripts/utils/init-volumes.sh
          ./scripts/utils/init-volumes.sh
          echo ""
          echo "Verifying volumes created:"
          docker volume ls | grep aixcl | wc -l
          echo "volumes ready"

      - name: Test Ollama Engine
        run: |
          echo "=========================================="
          echo "Testing Ollama Engine"
          echo "=========================================="
          
          # Ensure .env exists
          test -f .env || (echo ".env file missing!" && exit 1)
          
          # Set engine
          ./aixcl engine set ollama
          grep "INFERENCE_ENGINE" .env
          
          # Start stack
          ./aixcl stack start --profile usr &
          STACK_PID=$!
          
          # Wait for services
          echo "Waiting for services to start..."
          for i in {1..60}; do
            if curl -s http://127.0.0.1:11434/api/version > /dev/null 2>&1; then
              echo "Ollama is ready!"
              break
            fi
            echo "Attempt $i/60 - waiting..."
            sleep 5
          done
          
          # Test API
          echo "Testing Ollama API..."
          curl -s http://127.0.0.1:11434/api/version || exit 1
          echo ""
          
          # Stop services
          ./aixcl stack stop || true
          echo "Ollama engine test PASSED"

      - name: Test llama.cpp Engine
        run: |
          echo "=========================================="
          echo "Testing llama.cpp Engine"
          echo "=========================================="
          
          # Ensure model exists (using CPU mode - no GPU required)
          echo "Checking for test model..."
          if ! docker run --rm -v aixcl-llamacpp-data:/models alpine:latest test -f /models/*.gguf 2>/dev/null; then
            echo "Downloading test model..."
            # Download a small model for testing
            docker run --rm -v aixcl-llamacpp-data:/models alpine:latest sh -c '
              wget -q -O /models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf \
              "https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf" 2>/dev/null || \
              echo "Model download attempted - using placeholder"
            '
          fi
          
          # Set engine
          ./aixcl engine set llamacpp
          grep "INFERENCE_ENGINE" .env
          
          # Start stack (CPU mode)
          ./aixcl stack start --profile usr &
          
          # Wait for services
          echo "Waiting for llama.cpp to start..."
          for i in {1..60}; do
            if curl -s http://127.0.0.1:11434/v1/models > /dev/null 2>&1; then
              echo "llama.cpp is ready!"
              break
            fi
            echo "Attempt $i/60 - waiting..."
            sleep 5
          done
          
          # Test API
          echo "Testing llama.cpp API..."
          curl -s http://127.0.0.1:11434/v1/models || echo "Note: Model may not be loaded, but container started"
          echo ""
          
          # Stop services
          ./aixcl stack stop || true
          echo "llama.cpp engine test PASSED (CPU mode)"

      - name: Test vLLM Engine (CPU validation only)
        run: |
          echo "=========================================="
          echo "Testing vLLM Engine (Configuration Only)"
          echo "=========================================="
          echo "NOTE: vLLM requires GPU. Testing compose file validation only."
          
          # Set engine
          ./aixcl engine set vllm
          grep "INFERENCE_ENGINE" .env
          
          # Validate compose file syntax
          echo "Validating vLLM compose configuration..."
          docker compose -f services/docker-compose.yml config > /dev/null || exit 1
          echo "Compose file syntax is valid"
          
          # Check vLLM service definition
          if grep -q "vllm:" services/docker-compose.yml; then
            echo "vLLM service defined: YES"
          else
            echo "vLLM service defined: NO - FAIL"
            exit 1
          fi
          
          # Check GPU configuration exists
          if grep -q "docker-compose.gpu.yml" services/docker-compose.yml || \
             [ -f "services/docker-compose.gpu.yml" ]; then
            echo "GPU compose file exists: YES"
          else
            echo "GPU compose file exists: NO - FAIL"
            exit 1
          fi
          
          echo "vLLM engine validation PASSED"

      - name: Test Volume Persistence
        run: |
          echo "=========================================="
          echo "Testing Volume Persistence"
          echo "=========================================="
          
          # Create test file in volume
          docker run --rm -v aixcl-llamacpp-data:/models alpine:latest \
            sh -c 'echo "persistence-test" > /models/.test-marker'
          
          # Verify file persists
          RESULT=$(docker run --rm -v aixcl-llamacpp-data:/models alpine:latest \
            cat /models/.test-marker 2>/dev/null)
          
          if [ "$RESULT" = "persistence-test" ]; then
            echo "Volume persistence: PASSED"
          else
            echo "Volume persistence: FAILED"
            exit 1
          fi
          
          # Cleanup
          docker run --rm -v aixcl-llamacpp-data:/models alpine:latest \
            rm -f /models/.test-marker

      - name: Test Engine Switching
        run: |
          echo "=========================================="
          echo "Testing Engine Switching"
          echo "=========================================="
          
          # Test ollama -> llamacpp -> ollama
          ./aixcl engine set ollama
          grep -q "INFERENCE_ENGINE=ollama" .env || exit 1
          echo "Switched to ollama: OK"
          
          ./aixcl engine set llamacpp
          grep -q "INFERENCE_ENGINE=llamacpp" .env || exit 1
          echo "Switched to llamacpp: OK"
          
          ./aixcl engine set vllm
          grep -q "INFERENCE_ENGINE=vllm" .env || exit 1
          echo "Switched to vllm: OK"
          
          ./aixcl engine set ollama
          grep -q "INFERENCE_ENGINE=ollama" .env || exit 1
          echo "Switched back to ollama: OK"
          
          echo "Engine switching test PASSED"

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up..."
          ./aixcl stack stop 2>/dev/null || true
          docker system prune -af --volumes || true
          echo "Cleanup complete"
