name: Check Environment
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-env:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3be0be0c823d883a2aa034e4b4bfd4f2040a2d5a  # v4.2.0

      - name: Make aixcl executable
        run: chmod +x ./aixcl

      - name: Run aixcl check-env
        run: ./aixcl utils check-env
