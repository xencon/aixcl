name: PR Validation
permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches:
      - main
      - dev
    types: [opened, edited, synchronize, reopened]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate PR Title Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: "${{ github.event.pull_request.title }}"
          PR_AUTHOR: "${{ github.event.pull_request.user.login }}"
        run: |
          echo "Checking PR title: $PR_TITLE (author: $PR_AUTHOR)"

          # Dependabot generates its own title (a commit-message prefix colon,
          # no issue reference since dependency bumps aren't tied to an issue)
          # and has no way to follow this repo's convention -- exempt it
          # rather than force a manual title rewrite on every bump PR (#1923).
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "✅ Skipping title format check for Dependabot PR"
            exit 0
          fi

          # [OVERRIDE]-prefixed PRs carry an operator-authorized change with
          # no issue by design (AGENTS.md Section 8) -- exempt them from the
          # issue-reference requirement, mirroring the [OVERRIDE] exemption
          # already applied to issue titles (#1947).
          if echo "$PR_TITLE" | grep -qE '^\[OVERRIDE\] '; then
            echo "✅ Skipping issue-reference check for OVERRIDE PR"
          else
            # Check for issue reference (#number)
            if ! echo "$PR_TITLE" | grep -qE '\(#[0-9]+\)$'; then
              echo "❌ PR title must end with issue reference '(#<number>)'"
              echo "Expected format: '<description> (#<number>)'"
              echo "Current title: $PR_TITLE"
              exit 1
            fi
          fi

          # Check for colons in title (not allowed)
          if echo "$PR_TITLE" | grep -qE '^[^:]+:'; then
            echo "❌ PR title should not contain colons before the issue reference"
            echo "Expected format: '<description> (#<number>)' (NO colons)"
            exit 1
          fi

          echo "✅ PR title format is valid"

  validate-pr-assignee:
    name: Validate PR Assignee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check PR has assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Fetch live PR state via API — event payload may not reflect assignees
          # set immediately after creation (webhook fires before GitHub processes mutations)
          count=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.assignees | length')

          if [[ "$count" -gt 0 ]]; then
            echo "✅ PR has $count assignee(s):"
            gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.assignees[].login'
            exit 0
          fi

          echo "❌ PR must have at least one assignee"
          exit 1

  validate-pr-labels:
    name: Validate PR Labels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check PR has component label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Fetch live PR state via API — event payload may not reflect labels
          # set immediately after creation (webhook fires before GitHub processes mutations)
          labels=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.labels[].name')

          if echo "$labels" | grep -q "component:"; then
            echo "✅ PR has component label: $(echo "$labels" | grep "component:" | head -1)"
            exit 0
          fi

          echo "❌ PR must have at least one component label (component:*)"
          echo "Available component labels: component:cli, component:infrastructure, component:runtime-core, etc."
          exit 1

  validate-pr-body-references:
    name: Validate PR Body Reference List Style
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check for comma-packed issue references
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          body=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.body // ""')
          echo "$body" | bash scripts/checks/check-pr-references.sh
