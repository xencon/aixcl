name: Check Agents and Skills
permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'opencode/agents/**'
      - 'opencode/skills/**'
      - 'docs/reference/ai-report-*.md'
      - 'docs/developer/agent-template.md'
      - 'docs/developer/ai-file-naming.md'
      - 'scripts/check-agents.sh'
  workflow_dispatch:

jobs:
  check-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3be0be0c823d883a2aa034e4b4bfd4f2040a2d5a  # v4.2.0

      - name: Run agent/skill/report checks
        run: ./scripts/check-agents.sh
