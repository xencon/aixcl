name: Check Agents and Skills
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - '.opencode/agents/**'
      - '.opencode/skills/**'
      - '.opencode/rules/**'
      - 'docs/reference/ai-report-*.md'
      - 'docs/developer/agent-template.md'
      - 'docs/developer/ai-file-naming.md'
      - 'scripts/checks/check-agents.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-agents:
    runs-on: ubuntu-latest

    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Run agent/skill/report checks
        run: ./scripts/checks/check-agents.sh
