name: Check Agents and Skills
permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'ai/orchestration/**'
      - 'ai/skills/**'
      - 'docs/reference/ai-report-*.md'
      - 'docs/developer/agent-template.md'
      - 'docs/developer/ai-file-naming.md'
      - 'scripts/checks/check-agents.sh'
  workflow_dispatch:

jobs:
  check-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Run agent/skill/report checks
        run: ./scripts/checks/check-agents.sh
