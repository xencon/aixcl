name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Using index() for literal string matching instead of regex to avoid bracket interpretation issues
          awk -v ver="$VERSION" 'index($0, "## [" ver "]") == 1 {flag=1; next} index($0, "## [") == 1 {flag=0} flag' CHANGELOG.md > /tmp/release-notes.md || true
          if [ -s /tmp/release-notes.md ]; then
            echo "Found changelog section for $VERSION"
            cat /tmp/release-notes.md
          else
            echo "No changelog section found for $VERSION, using generic notes"
            echo "Release $VERSION" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "AIXCL ${{ steps.version.outputs.version }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
