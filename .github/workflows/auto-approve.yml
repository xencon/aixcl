name: Auto Approve
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
      - dev
    types: [opened, synchronize, reopened, edited, labeled, assigned]

jobs:
  auto-approve:
    name: Auto Approve PRs by CODEOWNER
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'sbadakhc'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Validate PR format before approving
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          # Check title ends with (#number)
          if ! echo "$PR_TITLE" | grep -qE '\(#[0-9]+\)$'; then
            echo "ERROR: PR title must end with issue reference '(#<number>)'"
            exit 1
          fi
          
          # Check no colons in title
          if echo "$PR_TITLE" | grep -qE '^[^:]+:'; then
            echo "ERROR: PR title should not contain colons"
            exit 1
          fi
          
          echo "PR title format is valid: $PR_TITLE"

      - name: Check PR has component label
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels) }}'
          if ! echo "$LABELS" | grep -q "component:"; then
            echo "ERROR: PR must have at least one component label"
            exit 1
          fi
          echo "PR has component label"

      - name: Check PR has assignee
        run: |
          ASSIGNEES='${{ toJson(github.event.pull_request.assignees) }}'
          if [[ -z "$ASSIGNEES" ]] || [[ "$ASSIGNEES" == "null" ]] || [[ "$ASSIGNEES" == "[]" ]]; then
            echo "ERROR: PR must have at least one assignee"
            exit 1
          fi
          echo "PR has assignee(s): $ASSIGNEES"

      - name: Approve PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review \
            --repo ${{ github.repository }} \
            --approve \
            --body "Auto-approved by CODEOWNER bot after PR validation checks passed." \
            "${{ github.event.pull_request.number }}"
