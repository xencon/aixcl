name: Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.1.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@57270e0600a9446d6b5e028b1e4a706692592d3c # v3.25.10
        with:
          languages: actions  # Projects with multiple languages can add them here as a comma-separated list.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@57270e0600a9446d6b5e028b1e4a706692592d3c # v3.25.10
        with:
          category: "/language:actions"

  shellcheck:
    name: Shell Script Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.1.0
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: '.'

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.1.0
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@57270e0600a9446d6b5e028b1e4a706692592d3c # v3.25.10
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: "/tool:trivy"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.1.0
      - name: Dependency Review
        uses: actions/dependency-review-action@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.3
        with:
          fail-on-severity: high
