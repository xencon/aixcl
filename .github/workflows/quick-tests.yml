name: Quick Tests

on:
  push:
    branches:
      - 'dev'
    paths:
      - '**.sh'
      - 'aixcl'
      - '.github/workflows/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run security tests
        run: |
          echo "Running security tests..."
          chmod +x tests/security/*.sh
          for test in tests/security/*.sh; do
            echo "Running: $test"
            bash "$test" || exit 1
          done
          echo "All security tests passed!"

  script-validation:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check script syntax
        run: |
          echo "Checking shell script syntax..."
          find . -type f -name "*.sh" ! -path "./.git/*" -exec bash -n {} \; 2>&1 | tee /tmp/syntax_errors.txt
          if [ -s /tmp/syntax_errors.txt ]; then
            echo "Syntax errors found!"
            exit 1
          fi
          echo "All scripts have valid syntax!"

      - name: Test script execution
        run: |
          echo "Testing critical scripts can be sourced..."
          chmod +x ./aixcl
          ./aixcl help > /dev/null || exit 1
          echo "Scripts are executable!"

  lib-tests:
    name: Library Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run lib test category
        run: |
          echo "Running library unit tests..."
          bash tests/run-tests.sh --category lib
          echo "Library tests passed!"
