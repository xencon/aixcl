# Prometheus Configuration for AIXCL Monitoring

global:
  scrape_interval: 15s           # How frequently to scrape targets
  evaluation_interval: 15s       # How frequently to evaluate rules
  external_labels:
    cluster: 'aixcl'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"
  - "app-alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter - System metrics (CPU, memory, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'node-exporter'
          instance: 'aixcl-host'

  # cAdvisor - Docker container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8081']
        labels:
          service: 'cadvisor'

  # PostgreSQL Exporter - Database metrics
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['localhost:9187']
        labels:
          service: 'postgres'
          database: 'aixcl'

  # NVIDIA GPU Exporter - GPU metrics (utilization, memory, temperature, power)
  # Uses custom exporter (nvidia-smi) on port 9445 in rootless mode
  # DCGM exporter (port 9400) requires root/Docker socket and doesn't work in rootless
  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['localhost:9445']
        labels:
          service: 'nvidia-gpu'
    # GPU exporter will only work on systems with NVIDIA GPUs and drivers
    # On systems without GPUs, Prometheus will mark it as down but continue working

  # Loki - Log aggregation system metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['localhost:3100']
        labels:
          service: 'loki'

  # Grafana - Self-monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'grafana'
    metrics_path: /metrics

  # Alertmanager - Alert delivery metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']
        labels:
          service: 'alertmanager'

  # Blackbox Exporter - HTTP health probes for services without native metrics
  # Ollama and Open WebUI expose no Prometheus /metrics endpoint; the platform
  # dashboard derives their UP/DOWN state from probe_success instead.
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://localhost:11434/api/version']
        labels:
          service: 'ollama'
      - targets: ['http://localhost:8080/health']
        labels:
          service: 'open-webui'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Application services - discovered via file_sd_configs
  # Apps write their targets to /etc/prometheus/app-targets/<app_name>.json
  # (mounted from host ./prometheus/file_sd/)
  # Default scrape path is /metrics; apps with a different path declare
  # prometheus.metrics_path in app.yaml (emitted as __metrics_path__ label).
  - job_name: 'aixcl-apps'
    file_sd_configs:
      - files:
          - 'app-targets/*.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
