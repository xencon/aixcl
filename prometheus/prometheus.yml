# Prometheus Configuration for AIXCL Monitoring

global:
  scrape_interval: 15s           # How frequently to scrape targets
  evaluation_interval: 15s       # How frequently to evaluate rules
  external_labels:
    cluster: 'aixcl'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter - System metrics (CPU, memory, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'node-exporter'
          instance: 'aixcl-host'

  # cAdvisor - Docker container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8081']
        labels:
          service: 'cadvisor'

  # PostgreSQL Exporter - Database metrics
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['localhost:9187']
        labels:
          service: 'postgres'
          database: 'aixcl'

  # Ollama - no native Prometheus metrics endpoint
  # Container-level metrics available via cAdvisor
  # Dashboard health indicator uses cAdvisor container_last_seen
  # - job_name: 'ollama'
  #   static_configs:
  #     - targets: ['localhost:11434']

  # NVIDIA GPU Exporter - GPU metrics (utilization, memory, temperature, power)
  # Uses custom exporter (nvidia-smi) on port 9445 in rootless mode
  # DCGM exporter (port 9400) requires root/Docker socket and doesn't work in rootless
  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['localhost:9445']
        labels:
          service: 'nvidia-gpu'
    # GPU exporter will only work on systems with NVIDIA GPUs and drivers
    # On systems without GPUs, Prometheus will mark it as down but continue working

  # Loki - Log aggregation system metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['localhost:3100']
        labels:
          service: 'loki'

  # Grafana - Self-monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'grafana'
    metrics_path: /metrics

  # Alertmanager - Alert delivery metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']
        labels:
          service: 'alertmanager'

  # Open WebUI - no native Prometheus metrics endpoint
  # Container-level metrics available via cAdvisor
  # - job_name: 'open-webui'
  #   static_configs:
  #     - targets: ['localhost:8080']


  # FTSO Price Monitor - Oracle price accuracy vs CoinGecko/Binance references
  - job_name: 'ftso-price-monitor'
    static_configs:
      - targets: ['localhost:9102']
        labels:
          service: 'ftso-price-monitor'
